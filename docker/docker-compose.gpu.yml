version: '3.8'

# Version optimisée pour GPU
services:
  orlyne:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    image: syntaxetech/orlyne-a12b:gpu
    container_name: orlyne-a12b-gpu
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../data:/data
      - ../models:/models
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ORLYNE_DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0,1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu, utility]
    runtime: nvidia